<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Control Bs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ══ RESET & VARS ══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:      #0e0e0e;
  --bg2:     #161616;
  --bg3:     #1f1f1f;
  --bg4:     #282828;
  --border:  #2e2e2e;
  --text:    #f0f0f0;
  --dim:     #666666;
  --dim2:    #999999;
  --cyan:    #ff6b1a;
  --cyan2:   #cc5200;
  --green:   #22c55e;
  --green2:  #14532d;
  --red:     #ef4444;
  --red2:    #450a0a;
  --blue:    #fb923c;
  --blue2:   #431407;
  --gold:    #fbbf24;
  --gold2:   #451a03;
  --purple:  #f97316;
  --purple2: #431407;
  --radius:  10px;
  --sidebar: 220px;
  --font:    'Inter',sans-serif;
  --mono:    'JetBrains Mono',monospace;
  --orange:  #ff6b1a;
  --orange2: #431407;
}
html,body{height:100%;font-family:var(--font);font-size:13px;background:var(--bg);color:var(--text)}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ══ LAYOUT ════════════════════════════════════════════════ */
#app{display:flex;height:100vh;overflow:hidden}

/* ══ SIDEBAR ═══════════════════════════════════════════════ */
#sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
  z-index:10;
}
.sidebar-logo{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--border);
}
.sidebar-logo .logo-text{
  font-size:18px;font-weight:700;color:var(--cyan);letter-spacing:-0.5px;
  text-shadow:0 0 20px rgba(255,107,26,0.4);
}
.sidebar-logo .logo-sub{font-size:10px;color:var(--dim);margin-top:2px}
.sync-badge{
  display:flex;align-items:center;gap:5px;
  font-size:9px;color:var(--dim);margin-top:6px;
}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);transition:background .3s}
.sync-dot.ok{background:var(--orange);box-shadow:0 0 6px rgba(255,107,26,.6)}
.sync-dot.loading{background:var(--gold);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Day selector */
.sidebar-section-title{
  padding:10px 16px 6px;
  font-size:9px;font-weight:700;color:var(--dim);letter-spacing:1px;
}
#day-list{
  flex:1;overflow-y:auto;padding:0 8px 8px;
  display:flex;flex-direction:column;gap:2px;
}
#day-list::-webkit-scrollbar{width:3px}
#day-list::-webkit-scrollbar-track{background:transparent}
#day-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

.day-item{
  display:flex;flex-direction:column;gap:0;
  border-radius:8px;overflow:hidden;
}
.day-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;background:transparent;border:none;
  color:var(--dim2);cursor:pointer;font-family:var(--font);
  font-size:11px;font-weight:500;border-radius:8px;
  transition:all .15s;text-align:left;width:100%;
}
.day-btn:hover{background:var(--bg3);color:var(--text)}
.day-btn.active{background:rgba(255,107,26,.15);color:var(--orange);font-weight:600}
.day-btn .day-num{
  font-family:var(--mono);font-size:10px;
  background:var(--bg4);padding:1px 5px;border-radius:4px;
}
.day-btn.active .day-num{background:rgba(255,107,26,.2);color:var(--orange)}
.day-label-inp{
  width:100%;background:rgba(255,107,26,.05);border:none;
  border-top:1px solid rgba(255,107,26,.2);
  color:var(--orange);padding:4px 10px;font-family:var(--mono);
  font-size:10px;outline:none;
}
.day-label-inp::placeholder{color:var(--dim)}

/* Sidebar nav */
#sidebar-nav{
  border-top:1px solid var(--border);padding:8px;
  display:flex;flex-direction:column;gap:2px;
}
.nav-btn{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;background:transparent;border:none;
  color:var(--dim2);cursor:pointer;font-family:var(--font);
  font-size:11px;font-weight:500;border-radius:8px;
  transition:all .15s;text-align:left;width:100%;
}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:rgba(255,107,26,.15);color:var(--orange)}
.nav-btn .nav-icon{font-size:14px;width:20px;text-align:center}

/* Sidebar actions */
#sidebar-actions{
  padding:8px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px;
}
.action-btn{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border:none;border-radius:8px;
  cursor:pointer;font-family:var(--font);font-size:11px;
  font-weight:600;transition:all .15s;width:100%;
}
.ab-cyan{background:rgba(255,107,26,.15);color:var(--orange)}
.ab-cyan:hover{background:rgba(255,107,26,.25)}
.ab-blue{background:rgba(59,130,246,.15);color:var(--blue)}
.ab-blue:hover{background:rgba(59,130,246,.25)}
.ab-green{background:rgba(16,185,129,.15);color:var(--green)}
.ab-green:hover{background:rgba(16,185,129,.25)}
.ab-red{background:rgba(244,63,94,.1);color:var(--red)}
.ab-red:hover{background:rgba(244,63,94,.2)}

/* ══ CONTENT AREA ══════════════════════════════════════════ */
#content{flex:1;overflow-y:auto;background:var(--bg)}
#content::-webkit-scrollbar{width:4px}
#content::-webkit-scrollbar-track{background:transparent}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

#page{padding:20px;max-width:1200px;}

/* ══ CARDS ═════════════════════════════════════════════════ */
.card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:16px;overflow:hidden;
}
.card-header{
  padding:10px 16px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);
}
.card-title{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--dim2)}
.card-title.t-cyan{color:var(--orange)}
.card-title.t-green{color:var(--green)}
.card-title.t-blue{color:#7dd3fc}
.card-title.t-gold{color:var(--gold)}
.card-title.t-purple{color:var(--purple)}

/* ══ TABLES ════════════════════════════════════════════════ */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:auto}
thead th{
  background:var(--bg3);color:var(--dim);font-weight:600;
  padding:7px 10px;text-align:center;border-bottom:1px solid var(--border);
  font-size:10px;letter-spacing:.5px;white-space:nowrap;
}
tbody td{padding:5px 8px;text-align:center;border-bottom:1px solid rgba(42,50,68,.5)}
tbody tr:hover td{background:rgba(255,255,255,.02)}
tfoot td{
  background:var(--bg3);font-weight:700;padding:7px 8px;
  font-family:var(--mono);font-size:11px;
  border-top:1px solid var(--border);text-align:center;
}
.td-l{text-align:left!important}
.td-mono{font-family:var(--mono);font-size:11px}
.td-cyan{color:var(--orange);font-family:var(--mono);font-size:11px;font-weight:600}
.td-green{color:var(--green);font-family:var(--mono);font-size:11px}
.td-blue{color:#7dd3fc;font-family:var(--mono);font-size:11px}
.td-red{color:var(--red);font-family:var(--mono);font-size:11px}
.td-dim{color:var(--dim2);font-family:var(--mono);font-size:11px}
.neg{color:var(--red)!important}

.cod-tag{
  display:inline-block;padding:2px 7px;border-radius:5px;
  background:rgba(255,107,26,.12);color:var(--orange);
  font-weight:700;font-size:10px;font-family:var(--mono);
  border:1px solid rgba(255,107,26,.25);
}

/* ══ INPUTS ════════════════════════════════════════════════ */
.ni,.ti{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--text);padding:4px 7px;
  font-family:var(--mono);font-size:11px;outline:none;
}
.ni{text-align:center}.ti{text-align:left}
.ni:focus,.ti:focus{border-color:var(--cyan);background:var(--bg4)}
.ni-fmt{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--orange);padding:4px 7px;
  font-family:var(--mono);font-size:11px;outline:none;text-align:center;
}
.ni-fmt:focus{border-color:var(--orange);background:var(--bg4);color:var(--text)}

.del-btn{background:transparent;border:none;color:var(--dim);cursor:pointer;
  font-size:14px;padding:0 4px;line-height:1;transition:color .15s}
.del-btn:hover{color:var(--red)}

.add-row-btn{
  display:block;width:100%;padding:9px;background:transparent;
  border:none;border-top:1px dashed var(--border);
  color:var(--dim2);cursor:pointer;font-size:12px;font-weight:600;
  transition:all .15s;font-family:var(--font);
}
.add-row-btn:hover,.add-row-btn:active{color:var(--orange);background:rgba(255,107,26,.06)}

/* ══ SALDOS PROM ═══════════════════════════════════════════ */
.prom-wrap{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim2)}
.prom-val{color:var(--orange);font-family:var(--mono);font-weight:600}
.prom-inp{
  width:100px;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--orange);padding:3px 7px;
  font-family:var(--mono);font-size:11px;text-align:center;outline:none;
}
.prom-inp:focus{border-color:var(--orange)}

/* ══ RESUMEN DÍA ═══════════════════════════════════════════ */
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;padding:12px}
.res-item{
  background:var(--bg3);border-radius:8px;padding:10px 14px;
  border:1px solid var(--border);
}
.res-item.win{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3)}
.res-item.loss{background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.3)}
.res-item.compra{background:rgba(16,185,129,.05)}
.res-item.venta{background:rgba(59,130,246,.05)}
.res-label{font-size:9px;font-weight:700;color:var(--dim);letter-spacing:.6px;margin-bottom:4px}
.res-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}
.win .res-val{color:var(--green);font-size:15px}
.loss .res-val{color:var(--red);font-size:15px}
.compra .res-val{color:var(--green)}
.venta .res-val{color:#7dd3fc}

/* ══ MES KPIs ══════════════════════════════════════════════ */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.kpi{padding:14px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2)}
.kpi.k-green{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.25)}
.kpi.k-blue {background:rgba(59,130,246,.07);border-color:rgba(59,130,246,.25)}
.kpi.k-cyan {background:rgba(34,211,238,.07);border-color:rgba(34,211,238,.25)}
.kpi-label{font-size:9px;font-weight:700;color:var(--dim);letter-spacing:.7px;margin-bottom:5px}
.kpi-val{font-family:var(--mono);font-size:15px;font-weight:700}
.k-green .kpi-val{color:var(--green)}
.k-blue  .kpi-val{color:#7dd3fc}
.k-cyan  .kpi-val{color:var(--cyan)}
.kpi-sub{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:2px}

/* ══ CLIENTE ═══════════════════════════════════════════════ */
.search-wrap{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px}
.search-inp{
  flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:7px 12px;font-size:12px;outline:none;
}
.search-inp:focus{border-color:var(--orange)}
.factura-wrap{padding:12px 14px}
.fac-header{margin-bottom:10px}
.fac-name{font-size:14px;font-weight:700;color:var(--cyan);margin-bottom:2px}
.fac-date{font-size:10px;color:var(--dim)}
.fac-section-title{font-size:10px;font-weight:700;letter-spacing:.6px;
  padding:6px 0 4px;border-top:1px solid var(--border);margin-top:8px}
.fac-section-title.t-blue{color:#7dd3fc}
.fac-section-title.t-green{color:var(--green)}
.fac-total-row{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--bg3);border-radius:7px;padding:8px 12px;margin:8px 0;
}
.fac-neto{
  background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);
  border-radius:8px;padding:10px 14px;margin-top:10px;
  display:flex;justify-content:space-between;
}
.fac-neto-side{display:flex;flex-direction:column;gap:2px}
.fac-neto-label{font-size:9px;color:var(--dim);font-weight:700;letter-spacing:.5px}
.fac-neto-val{font-family:var(--mono);font-size:14px;font-weight:700}
.copy-btn{
  display:block;width:100%;padding:9px;margin-top:10px;
  background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);
  border-radius:8px;color:var(--purple);cursor:pointer;
  font-family:var(--font);font-size:12px;font-weight:600;transition:all .15s;
}
.copy-btn:hover{background:rgba(168,85,247,.25)}
.empty-msg{padding:20px;text-align:center;color:var(--dim);font-size:12px}

/* ══ DIRECTO ═══════════════════════════════════════════════ */
.directo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
@media(max-width:600px){.directo-grid{grid-template-columns:1fr}}
.df{display:flex;flex-direction:column;gap:4px}
.df-label{font-size:9px;font-weight:700;color:var(--dim);letter-spacing:.5px}
.df-inp{
  background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:7px 10px;font-size:12px;font-family:var(--mono);outline:none;
}
.df-inp:focus{border-color:var(--gold)}
.directo-preview{
  margin:0 14px 10px;background:var(--bg3);border-radius:8px;
  padding:10px 14px;border:1px solid rgba(245,158,11,.2);
}
.dp-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.dp-label{color:var(--dim)}
.dp-val{font-family:var(--mono);font-weight:600}
.dp-ganancia{color:var(--green);font-size:13px!important}
.reg-btn{
  display:block;width:calc(100% - 28px);margin:0 14px 14px;
  padding:10px;background:linear-gradient(135deg,#d97706,#f59e0b);
  border:none;border-radius:8px;color:#000;font-weight:700;
  font-family:var(--font);font-size:13px;cursor:pointer;transition:all .15s;
}
.reg-btn:hover{filter:brightness(1.1)}

/* ══ MOD POPUP ═════════════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;display:flex;align-items:center;justify-content:center;
}
.modal{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:20px;width:min(440px,95vw);max-height:85vh;overflow-y:auto;
}
.modal h3{font-size:13px;font-weight:700;color:var(--orange);margin-bottom:14px}
.acc-item{display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;background:var(--bg3);border-radius:7px;margin-bottom:4px}
.acc-item span{font-family:var(--mono);font-size:11px}
.acc-add{display:flex;gap:6px;margin-bottom:10px}
.acc-add input{flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:7px;color:var(--text);padding:7px 10px;font-size:12px;outline:none}
.acc-add input:focus{border-color:var(--cyan)}
.cfg-label{font-size:10px;color:var(--dim);letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.cfg-inp{width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:7px;color:var(--text);padding:8px 10px;font-family:var(--mono);
  font-size:11px;outline:none;margin-bottom:12px}
.cfg-inp:focus{border-color:var(--cyan)}
.cfg-note{font-size:10px;color:var(--dim);margin-top:-8px;margin-bottom:10px;line-height:1.5}
.btn-row{display:flex;gap:8px;margin-top:4px}
.mbtn{padding:8px 14px;border-radius:7px;border:none;cursor:pointer;
  font-family:var(--font);font-size:12px;font-weight:600;transition:all .15s}
.mbtn-cyan{background:var(--cyan);color:#000}
.mbtn-ghost{background:var(--bg3);color:var(--dim2);border:1px solid var(--border)}
.mbtn-green{background:rgba(16,185,129,.2);color:var(--green);border:1px solid rgba(16,185,129,.3)}

/* ══ TOAST ═════════════════════════════════════════════════ */
/* ══ DEUDORES / ACREEDORES ════════════════════════════════ */
.fiar-btn{
  padding:2px 7px;border-radius:5px;border:1px solid var(--orange);
  background:rgba(255,107,26,.1);color:var(--orange);cursor:pointer;
  font-size:9px;font-weight:700;font-family:var(--font);transition:all .15s;
  white-space:nowrap;
}
.fiar-btn:hover{background:rgba(255,107,26,.25)}
.fiar-btn.fiado{background:var(--orange);color:#000}
.deudor-card{
  background:var(--bg3);border-radius:8px;padding:10px 14px;
  border:1px solid var(--border);margin-bottom:6px;
  display:flex;justify-content:space-between;align-items:center;
}
.deudor-card.cobrar{border-left:3px solid var(--orange)}
.deudor-card.pagar {border-left:3px solid var(--green)}
.deudor-nombre{font-weight:600;font-size:12px;margin-bottom:2px}
.deudor-detalle{font-size:10px;color:var(--dim);font-family:var(--mono)}
.deudor-saldo{text-align:right}
.deudor-saldo-val{font-family:var(--mono);font-size:14px;font-weight:700}
.deudor-saldo-val.cobrar{color:var(--orange)}
.deudor-saldo-val.pagar {color:var(--green)}
.abono-wrap{display:flex;gap:6px;margin-top:6px}
.abono-inp{
  flex:1;background:var(--bg2);border:1px solid var(--border);
  border-radius:6px;color:var(--text);padding:5px 8px;
  font-family:var(--mono);font-size:11px;outline:none;
}
.abono-inp:focus{border-color:var(--orange)}
.abono-btn{
  padding:5px 10px;border-radius:6px;border:none;cursor:pointer;
  background:var(--orange);color:#000;font-weight:700;
  font-family:var(--font);font-size:11px;transition:all .15s;
}
.abono-btn:hover{filter:brightness(1.1)}
.deuda-totales{
  display:flex;justify-content:space-between;
  padding:10px 14px;background:var(--bg3);
  border-radius:8px;margin-bottom:12px;
}
.deuda-tot-item{text-align:center}
.deuda-tot-label{font-size:9px;color:var(--dim);font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.deuda-tot-val{font-family:var(--mono);font-size:14px;font-weight:700}

/* ══ POSICIÓN / BALANCE ════════════════════════════════════ */
.balance-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:14px}
.bal-item{background:var(--bg3);border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.bal-item.positive{background:rgba(255,107,26,.08);border-color:rgba(255,107,26,.3)}
.bal-item.negative{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.25)}
.bal-item.neutral {background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.25)}
.bal-item.total   {background:rgba(255,107,26,.15);border-color:var(--orange);grid-column:1/-1}
.bal-label{font-size:9px;font-weight:700;color:var(--dim);letter-spacing:.7px;margin-bottom:6px}
.bal-val  {font-family:var(--mono);font-size:15px;font-weight:700}
.bal-sub  {font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:2px}
.bal-item.positive .bal-val{color:var(--orange)}
.bal-item.negative .bal-val{color:var(--red)}
.bal-item.neutral  .bal-val{color:var(--green)}

<script>

// ══ STATE ══════════════════════════════════════════════════
const DEFAULT_ACCOUNTS = [
  {cod:"VY",nombre:"VENEZUELA YHOSUE"},{cod:"BY",nombre:"BANESCO YOSMEL"},
  {cod:"PH",nombre:"PROVINCIAL HUGO"}, {cod:"BD",nombre:"BANESCO DEISY"},
  {cod:"VP",nombre:"VENEZUELA PAPA"},  {cod:"DN",nombre:"DANIEL"},
  {cod:"DR",nombre:"DIRECTOS"},        {cod:"VM",nombre:"VNZLA MAMA"},
  {cod:"PP",nombre:"PAPA PROVINCIAL"},
];
let state = { accounts:DEFAULT_ACCOUNTS, days:[], currentDay:0, scriptUrl:"", deudores:{}, gastos:[], pagos:[],
  medios:["Efectivo","Bancolombia JAS","Bancolombia YH","Bancolombia Yosmel","Nequi","Compensar Munich","Otro"], capital:0 };
// deudores structure: { "nombre": { tipo:"cobrar"|"pagar", movs:[{fecha,bs,tasa,cop,dia}], abonos:[{fecha,cop}] } }
let currentView = "dia";
let clienteFiltro = "";
let directoData = {cliente:"",proveedor:"",codProv:"DR",bs:"",tasaVenta:"",tasaCompra:""};
let syncTimer = null;
let toastTimer = null;

// ══ HELPERS ════════════════════════════════════════════════
function rawNum(str){
  if(str===undefined||str===null||str==="") return 0;
  if(typeof str==="number") return str;
  let s=String(str).trim();
  if(s.includes(".")&&s.includes(",")){
    if(s.lastIndexOf(".")>s.lastIndexOf(",")) s=s.replace(/,/g,"");
    else s=s.replace(/\./g,"").replace(",",".");
  } else if(s.includes(",")){
    const p=s.split(",");
    if(p.length===2&&p[1].length>=1&&p[1].length<=4) s=s.replace(",",".");
    else s=s.replace(/,/g,"");
  } else if(s.includes(".")){
    const p=s.split(".");
    if(p.length>=2&&p[p.length-1].length===3) s=s.replace(/\./g,"");
  }
  return parseFloat(s)||0;
}
const n = v => {
  if(v===undefined||v===null||v==="") return 0;
  if(typeof v==="number") return v;
  return rawNum(v);
};
const fmt = (v,d=2) => v===undefined||v===null||v===""?"":Number(v).toLocaleString("es-CO",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtCOP = v => (v||v===0)?"$ "+Number(v).toLocaleString("es-CO",{minimumFractionDigits:0,maximumFractionDigits:0}):"";
function fmtInput(val){
  if(val===undefined||val===null||val==="") return "";
  const num=rawNum(val); if(num===0) return "";
  return num.toLocaleString("es-CO",{minimumFractionDigits:0,maximumFractionDigits:4});
}
function todayStr(){
  const d=new Date();
  return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;
}

// ══ CALCULATIONS ═══════════════════════════════════════════
function calcStock(s,ventas,compras){
  const c=compras.filter(x=>x.cod===s.cod&&x.cod!=="DR").reduce((a,x)=>a+n(x.bs),0);
  const v=ventas.filter(x=>x.cod===s.cod&&x.cod!=="DR").reduce((a,x)=>a+n(x.bs),0);
  return n(s.inicioBs)+c-v;
}
function calcPromCompraReal(day){
  const totInicio=day.saldos.reduce((a,s)=>a+n(s.inicioBs),0);
  const promInicio=n(day.saldos[0]?.promedio);
  const comprasReales=day.compras.filter(c=>c.cod!=="DR");
  const sumBsC=comprasReales.reduce((a,c)=>a+n(c.bs),0);
  const sumCopC=comprasReales.reduce((a,c)=>a+n(c.bs)*n(c.tasa),0);
  const denom=totInicio+sumBsC;
  return denom===0?promInicio:(totInicio*promInicio+sumCopC)/denom;
}
function calcResumen(day){
  const inicioBs=day.saldos.reduce((a,s)=>a+n(s.inicioBs),0);
  const promInicio=n(day.saldos[0]?.promedio);
  const inicioPesos=inicioBs*promInicio;
  const comprasReales=day.compras.filter(c=>c.cod!=="DR");
  const ventasReales=day.ventas.filter(v=>v.cod!=="DR");
  const comprasDirectas=day.compras.filter(c=>c.cod==="DR");
  const ventasDirectas=day.ventas.filter(v=>v.cod==="DR");
  const bsComp=comprasReales.reduce((a,c)=>a+n(c.bs),0);
  const copComp=comprasReales.reduce((a,c)=>a+n(c.bs)*n(c.tasa),0);
  const bsVend=ventasReales.reduce((a,v)=>a+n(v.bs),0);
  const copVend=ventasReales.reduce((a,v)=>a+n(v.bs)*n(v.tasa),0);
  const copVentaDir=ventasDirectas.reduce((a,v)=>a+n(v.bs)*n(v.tasa),0);
  const copCompraDir=comprasDirectas.reduce((a,c)=>a+n(c.bs)*n(c.tasa),0);
  const utilidadDirecta=copVentaDir-copCompraDir;
  const promCompra=calcPromCompraReal(day);
  const promVenta=bsVend>0?copVend/bsVend:0;
  const utilidad=(promVenta-promCompra)*bsVend+utilidadDirecta;
  const quedaBs=inicioBs+bsComp-bsVend;
  const valorPesos=quedaBs*promCompra;
  const bsCompTotal=bsComp+comprasDirectas.reduce((a,c)=>a+n(c.bs),0);
  const copCompTotal=copComp+copCompraDir;
  const bsVendTotal=bsVend+ventasDirectas.reduce((a,v)=>a+n(v.bs),0);
  const copVendTotal=copVend+copVentaDir;
  return {inicioBs,inicioPesos,bsComp:bsCompTotal,copComp:copCompTotal,bsVend:bsVendTotal,
    copVend:copVendTotal,bsCompReal:bsComp,bsVendReal:bsVend,utilidadDirecta,
    promCompra,promVenta,utilidad,quedaBs,valorPesos};
}

// ══ STORAGE ════════════════════════════════════════════════
function saveLocal(){ try{localStorage.setItem("cuadregeneral_v1",JSON.stringify(state));}catch{} }
function loadLocal(){ try{const d=localStorage.getItem("cuadregeneral_v1");if(d){state=JSON.parse(d);return true;}}catch{}return false; }

// ══ SYNC ═══════════════════════════════════════════════════
function setSyncStatus(s,t){
  const dot=document.getElementById("sync-dot");
  const txt=document.getElementById("sync-text");
  const timeEl=document.getElementById("sync-time");
  if(dot) dot.className="sync-dot "+s;
  if(txt) txt.textContent=t;
  if(timeEl){
    if(s==="ok"){
      const now=new Date();
      const hora=now.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
      timeEl.textContent="Último guardado: "+hora;
      timeEl.style.display="block";
      timeEl.style.color="var(--green)";
    } else if(s==="error"){
      timeEl.textContent="⚠️ Sin conexión — datos solo en este dispositivo";
      timeEl.style.display="block";
      timeEl.style.color="var(--red)";
    } else if(s==="loading"){
      timeEl.style.display="none";
    }
  }
  // Show floating warning banner if error
  const banner=document.getElementById("sync-banner");
  if(banner){
    if(s==="error"){
      banner.style.display="flex";
    } else if(s==="ok"){
      banner.style.display="none";
    }
  }
}
async function syncLoad(){
  if(!state.scriptUrl) return;
  setSyncStatus("loading","Sincronizando...");
  showToast("Sincronizando...","ok");
  try{
    const res=await fetch(state.scriptUrl+"?action=load&t="+Date.now());
    const data=await res.json();
    if(data.ok){
      if(data.accounts) state.accounts=data.accounts;
      if(data.days&&data.days.length>0){ state.days=data.days; state.currentDay=data.currentDay||0; }
      saveLocal(); setSyncStatus("ok","Guardado ✓");
      showToast("✓ Datos sincronizados","ok");
      render();
      const sb=document.getElementById("sync-banner");if(sb)sb.style.display="none";
    } else { setSyncStatus("error","Error"); showToast("Error al sincronizar","err"); }
  }catch(e){ setSyncStatus("error","Sin conexión"); showToast("Sin conexión a Sheets","err"); }
}
function syncSave(){
  if(!state.scriptUrl) return;
  clearTimeout(syncTimer);
  setSyncStatus("loading","Guardando...");
  syncTimer=setTimeout(async()=>{
    try{
      const res=await fetch(state.scriptUrl,{method:"POST",
        body:JSON.stringify({action:"save",state:{accounts:state.accounts,days:state.days,currentDay:state.currentDay}})});
      const data=await res.json();
      if(data.ok) setSyncStatus("ok","Guardado ✓");
      else setSyncStatus("error","Error al guardar");
    }catch(e){ setSyncStatus("error","Sin conexión"); }
  },1500);
}
async function syncNow(){ if(!state.scriptUrl){openConfig();return;} await syncLoad(); }

// ══ CONFIG ═════════════════════════════════════════════════
function openConfig(){ document.getElementById("cfg-url").value=state.scriptUrl||""; document.getElementById("modal-cfg").style.display="flex"; }
function closeCfg(){ document.getElementById("modal-cfg").style.display="none"; }
async function saveCfg(){
  const url=document.getElementById("cfg-url").value.trim();
  if(!url){showToast("Ingresa la URL","err");return;}
  state.scriptUrl=url; saveLocal(); closeCfg(); await syncLoad();
}

// ══ DAY MANAGEMENT ═════════════════════════════════════════
function emptyDay(prevDay=null){
  const promPrev=prevDay?calcPromCompraReal(prevDay):0;
  return{
    label:todayStr(),
    saldos:state.accounts.map(a=>{
      let inicioBs=0;
      if(prevDay){const ps=prevDay.saldos.find(s=>s.cod===a.cod);if(ps) inicioBs=calcStock(ps,prevDay.ventas,prevDay.compras);}
      return{cod:a.cod,inicioBs,promedio:promPrev};
    }),
    ventas:[{nombre:"",cod:"",tasa:"",bs:"",done:false}],
    compras:[{nombre:"",cod:"",tasa:"",bs:"",done:false}],
  };
}
function addDay(){
  const prev=state.days.length>0?state.days[state.days.length-1]:null;
  state.days.push(emptyDay(prev));
  state.currentDay=state.days.length-1;
  clienteFiltro=""; directoData={cliente:"",proveedor:"",codProv:"DR",bs:"",tasaVenta:"",tasaCompra:""};
  saveLocal(); syncSave(); render();
}
function setCurrentDay(i){
  state.currentDay=i; clienteFiltro="";
  directoData={cliente:"",proveedor:"",codProv:"DR",bs:"",tasaVenta:"",tasaCompra:""};
  saveLocal(); renderPage(); renderDayList();
}
function resetMonth(){
  if(!confirm("¿Resetear el mes? Se borrarán todos los datos.")) return;
  state.days=[emptyDay()]; state.currentDay=0;
  saveLocal(); syncSave(); render();
}

// ══ UPDATES ════════════════════════════════════════════════
function updatePromedio(val){
  const day=state.days[state.currentDay];
  const num=rawNum(val)||0;
  day.saldos=day.saldos.map(s=>({...s,promedio:num}));
  saveLocal(); syncSave(); renderResumenBlock(); updateSaldoCalcs();
}
function updateInicio(idx,val){
  state.days[state.currentDay].saldos[idx].inicioBs=rawNum(val)||0;
  saveLocal(); syncSave(); updateSaldoCalcs(); renderResumenBlock();
}
function updateSaldoCalcs(){
  const day=state.days[state.currentDay];
  day.saldos.forEach((s,i)=>{
    const pesos=n(s.inicioBs)*n(s.promedio);
    const compra=day.compras.filter(c=>c.cod===s.cod&&c.cod!=="DR").reduce((a,c)=>a+n(c.bs),0);
    const venta=day.ventas.filter(v=>v.cod===s.cod&&v.cod!=="DR").reduce((a,v)=>a+n(v.bs),0);
    const stock=n(s.inicioBs)+compra-venta;
    const row=document.getElementById(`sr-${i}`);
    if(!row) return;
    row.querySelector(".s-pesos").textContent=fmt(pesos,0);
    row.querySelector(".s-compra").textContent=fmt(compra,2);
    row.querySelector(".s-venta").textContent=fmt(venta,2);
    const st=row.querySelector(".s-stock");
    st.textContent=fmt(stock,2); st.className="s-stock td-cyan"+(stock<0?" neg":"");
  });
  const totI=day.saldos.reduce((a,s)=>a+n(s.inicioBs),0);
  const totP=day.saldos.reduce((a,s)=>a+n(s.inicioBs)*n(s.promedio),0);
  const totC=day.compras.filter(c=>c.cod!=="DR").reduce((a,c)=>a+n(c.bs),0);
  const totV=day.ventas.filter(v=>v.cod!=="DR").reduce((a,v)=>a+n(v.bs),0);
  const totS=day.saldos.reduce((a,s)=>a+calcStock(s,day.ventas,day.compras),0);
  const tf=document.getElementById("saldo-foot");
  if(tf){tf.cells[1].textContent=fmt(totI,2);tf.cells[2].textContent=fmt(totP,0);
    tf.cells[3].textContent=fmt(totC,2);tf.cells[4].textContent=fmt(totV,2);tf.cells[5].textContent=fmt(totS,2);}
}

function reRenderMov(tipo){
  const day=state.days[state.currentDay];
  const el=document.getElementById("mov-"+tipo);
  if(el) el.outerHTML=renderMovHTML(day,tipo);
}
function updateMov(tipo,idx,field,val){
  const day=state.days[state.currentDay];
  if(field==="bs"||field==="tasa") day[tipo][idx][field]=rawNum(val)||val;
  else day[tipo][idx][field]=val;
  if(field==="cod"){
    const acc=state.accounts.find(a=>a.cod===val.toUpperCase());
    const el=document.getElementById(`${tipo}-cta-${idx}`);
    if(el) el.textContent=acc?.nombre||"";
  }
  const copEl=document.getElementById(`${tipo}-cop-${idx}`);
  const copMob=document.getElementById(`${tipo}-cop-mob-${idx}`);
  if(copEl){
    const r=day[tipo][idx];
    const copVal=n(r.bs)&&n(r.tasa)?n(r.bs)*n(r.tasa):0;
    const copFmt=copVal?fmt(copVal,0):"";
    copEl.textContent=copFmt;
    if(copMob) copMob.textContent=copVal?"= "+fmtCOP(copVal):"";
  }
  saveLocal(); syncSave(); renderMovTotals(tipo); renderResumenBlock(); updateSaldoCalcs();
}
function renderMovTotals(tipo){
  const day=state.days[state.currentDay];
  const totBs=day[tipo].reduce((a,r)=>a+n(r.bs),0);
  const totCop=day[tipo].reduce((a,r)=>a+n(r.bs)*n(r.tasa),0);
  const eb=document.getElementById(`${tipo}-tot-bs`);
  const ec=document.getElementById(`${tipo}-tot-cop`);
  if(eb) eb.textContent=fmt(totBs,2);
  if(ec) ec.textContent=fmt(totCop,0);
}
function addMovRow(tipo){
  const day=state.days[state.currentDay];
  day[tipo].push({nombre:"",cod:"",tasa:"",bs:"",done:false});
  saveLocal(); syncSave(); reRenderMov(tipo); renderResumenBlock(); updateSaldoCalcs();
}
function delMovRow(tipo,idx){
  const day=state.days[state.currentDay];
  day[tipo].splice(idx,1);
  saveLocal(); syncSave(); reRenderMov(tipo); renderResumenBlock(); updateSaldoCalcs();
}
function toggleDone(tipo,idx){
  const day=state.days[state.currentDay];
  day[tipo][idx].done=!day[tipo][idx].done;
  saveLocal(); syncSave();
  const row=document.getElementById(`mov-row-${tipo}-${idx}`);
  if(row) row.style.opacity=day[tipo][idx].done?"0.5":"1";
  const cb=document.getElementById(`chk-${tipo}-${idx}`);
  if(cb) cb.textContent=day[tipo][idx].done?"✅":"☐";
}

// ══ DIRECTO ════════════════════════════════════════════════
function updateDirecto(field,val){
  if(field==="bs"||field==="tasaVenta"||field==="tasaCompra") directoData[field]=rawNum(val)||val;
  else directoData[field]=val;
  renderDirectoPreview();
}
function renderDirectoPreview(){
  const bs=n(directoData.bs),tv=n(directoData.tasaVenta),tc=n(directoData.tasaCompra);
  const el=document.getElementById("directo-preview");
  if(!el) return;
  el.innerHTML=`<div class="dp-row"><span class="dp-label">COP que recibes</span><span class="dp-val td-blue">${fmtCOP(bs*tv)}</span></div>
    <div class="dp-row"><span class="dp-label">COP que pagas</span><span class="dp-val td-green">${fmtCOP(bs*tc)}</span></div>
    <div class="dp-row" style="border-top:1px solid var(--border);margin-top:5px;padding-top:5px">
    <span class="dp-label">GANANCIA</span><span class="dp-val dp-ganancia">${fmtCOP(bs*tv-bs*tc)}</span></div>`;
}
function guardarDirecto(){
  const bs=n(directoData.bs),tv=n(directoData.tasaVenta),tc=n(directoData.tasaCompra);
  if(!bs||!tv||!tc){showToast("Completa Bs, tasa venta y compra","err");return;}
  if(!directoData.cliente){showToast("Ingresa el cliente","err");return;}
  if(!directoData.proveedor){showToast("Ingresa el proveedor","err");return;}
  const day=state.days[state.currentDay];
  day.ventas.push({nombre:directoData.cliente,cod:directoData.codProv||"DR",tasa:tv,bs,done:false});
  day.compras.push({nombre:directoData.proveedor,cod:directoData.codProv||"DR",tasa:tc,bs,done:false});
  directoData={cliente:"",proveedor:"",codProv:"DR",bs:"",tasaVenta:"",tasaCompra:""};
  saveLocal(); syncSave(); reRenderMov("ventas"); reRenderMov("compras");
  renderResumenBlock(); updateSaldoCalcs();
  const el=document.getElementById("directo-form");
  if(el) el.outerHTML=renderDirectoHTML();
  showToast("Operación directa registrada ✓","ok");
}

// ══ ACCOUNTS ═══════════════════════════════════════════════
function openAccMgr(){
  document.getElementById("acc-list").innerHTML=state.accounts.map(a=>`
    <div class="acc-item">
      <span><strong style="color:var(--cyan)">${a.cod}</strong> — ${a.nombre}</span>
      <button class="del-btn" onclick="removeAccount('${a.cod}')">×</button>
    </div>`).join("");
  document.getElementById("modal-acc").style.display="flex";
}
function closeAccMgr(){ document.getElementById("modal-acc").style.display="none"; }
function addAccount(){
  const cod=document.getElementById("new-cod").value.trim().toUpperCase();
  const nom=document.getElementById("new-nom").value.trim().toUpperCase();
  if(!cod||!nom){showToast("Completa COD y Nombre","err");return;}
  if(state.accounts.find(a=>a.cod===cod)){showToast("Ese COD ya existe","err");return;}
  state.accounts.push({cod,nombre:nom});
  state.days.forEach(day=>day.saldos.push({cod,inicioBs:0,promedio:day.saldos[0]?.promedio||0}));
  saveLocal(); syncSave(); openAccMgr(); render(); showToast(`Cuenta ${cod} agregada`,"ok");
}
function removeAccount(cod){
  if(!confirm(`¿Eliminar cuenta ${cod}?`)) return;
  state.accounts=state.accounts.filter(a=>a.cod!==cod);
  state.days.forEach(day=>day.saldos=day.saldos.filter(s=>s.cod!==cod));
  saveLocal(); syncSave(); openAccMgr(); render();
}

function showToast(msg,type="ok"){

// ══ RENDER ═════════════════════════════════════════════════
function setView(v){
  currentView=v;
  ["dia","mes","cuentas","posicion"].forEach(x=>{
    const nb=document.getElementById("nav-"+x);
    if(nb) nb.classList.toggle("active",x===v);
  });
  renderPage();
}
function toggleMobDays(){
  const bar=document.getElementById("mob-day-bar");
  bar.classList.toggle("open");
  renderMobDayList();
}
function renderMobDayList(){
  const list=document.getElementById("mob-day-list");
  if(!list) return;
  list.innerHTML=state.days.map((d,i)=>`
    <button class="mob-day-chip ${i===state.currentDay?"active":""}"
      onclick="setCurrentDay(${i});document.getElementById('mob-day-bar').classList.remove('open')">
      ${d.label||`Día ${String(i+1).padStart(2,"0")}`}
    </button>`).join("");
}
function setMobActive(el){
  document.querySelectorAll(".mob-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}
function render(){ renderDayList(); renderPage(); }

function renderDayList(){
  const container=document.getElementById("day-list");
  if(!container) return;
  container.innerHTML="";
  state.days.forEach((d,i)=>{
    const wrap=document.createElement("div");
    wrap.className="day-item";
    const btn=document.createElement("button");
    btn.className="day-btn"+(i===state.currentDay?" active":"");
    btn.innerHTML=`<span>${d.label||`Día ${String(i+1).padStart(2,"0")}`}</span><span class="day-num">${String(i+1).padStart(2,"0")}</span>`;
    btn.onclick=()=>setCurrentDay(i);
    wrap.appendChild(btn);
    if(i===state.currentDay){
      const inp=document.createElement("input");
      inp.className="day-label-inp"; inp.value=d.label||""; inp.placeholder="Nombre o fecha";
      inp.oninput=e=>{
        state.days[i].label=e.target.value; saveLocal(); syncSave();
        btn.querySelector("span").textContent=e.target.value||`Día ${String(i+1).padStart(2,"0")}`;
      };
      wrap.appendChild(inp);
    }
    container.appendChild(wrap);
  });
  renderMobDayList();
}

function renderPage(){
  const page=document.getElementById("page");
  if(!page) return;
  if(state.days.length===0){page.innerHTML="<p style='color:var(--dim);padding:20px'>Sin días — crea el primero</p>";return;}
  if(currentView==="mes"){ page.innerHTML=renderMesHTML(); return; }
  if(currentView==="cuentas"){ 
    page.innerHTML='<div id="cuentas-app"></div>';
    renderCuentasApp();
    return; 
  }
  if(currentView==="posicion"){
    page.innerHTML='<div id="posicion-page"></div>';
    renderPosicionPage();
    return;
  }
  const day=state.days[state.currentDay];
  page.innerHTML=`
    ${renderSaldosHTML(day)}
    <div class="mov-grid-wrap">
      ${renderMovHTML(day,"ventas")}
      ${renderMovHTML(day,"compras")}
    </div>
    ${renderDirectoHTML()}
    ${renderResumenHTML(day)}
    ${renderClienteHTML()}
  `;
}

      </div>
    </div>
    <div class="tbl-wrap"><table>

        const cop=n(c.bs)*n(c.tasa);
        rows+=`<tr><td>${i+1}</td><td class="td-green">${fmt(n(c.bs),2)}</td>
          <td>${fmt(n(c.tasa),4)}</td><td class="td-blue">${fmtCOP(cop)}</td>
          <td style="font-size:10px;color:var(--dim)">${state.accounts.find(a=>a.cod===c.cod)?.nombre||c.cod||"—"}</td></tr>`;
      });
      cs=`<div class="fac-section-title t-green">📥 COMPRAS — Lo que le debo</div>
        <table><thead><tr><th>#</th><th>Bs</th><th>TASA</th><th>COP</th><th>CUENTA</th></tr></thead><tbody>${rows}</tbody></table>
        <div class="fac-total-row">
          <div><div style="font-size:9px;color:var(--dim)">TOTAL Bs</div><div class="td-green" style="font-family:var(--mono);font-weight:700">${fmt(tCBs,2)}</div></div>
          <div style="text-align:right"><div style="font-size:9px;color:var(--dim)">TOTAL COP</div><div style="font-family:var(--mono);font-weight:700;color:var(--green)">${fmtCOP(tCCop)}</div></div>
        </div>`;
    }
    if(filtV.length>0&&filtC.length>0){
      const nBS=tVBs-tCBs,nCOP=tVCop-tCCop;
      neto=`<div class="fac-neto">
        <div class="fac-neto-side">
          <div class="fac-neto-label">${nBS>=0?"ME DEBE (Bs)":"LE DEBO (Bs)"}</div>
          <div class="fac-neto-val" style="color:${nBS>=0?"#7dd3fc":"var(--red)"}">${fmt(Math.abs(nBS),2)}</div>
        </div>
        <div class="fac-neto-side" style="text-align:right">
          <div class="fac-neto-label">${nCOP>=0?"ME DEBE (COP)":"LE DEBO (COP)"}</div>
          <div class="fac-neto-val" style="color:${nCOP>=0?"var(--green)":"var(--red)"}">${fmtCOP(Math.abs(nCOP))}</div>
        </div>
      </div>`;
    }
    const copyText=buildFacturaText(clienteFiltro,filtV,filtC,tVBs,tVCop,tCBs,tCCop,day.label);
    body=`<div class="factura-wrap">
      <div class="fac-header"><div class="fac-name">${clienteFiltro.toUpperCase()}</div><div class="fac-date">${day.label}</div></div>
      ${vs}${cs}${neto}
      <button class="copy-btn" onclick="copyFactura(\`${copyText.replace(/`/g,"'")}\`)">📋 Copiar resumen para WhatsApp</button>
    </div>`;
  } else {
    body=`<div class="empty-msg">Escribe el nombre para ver sus transacciones</div>`;
  }
  return `<div class="card" id="cliente-block">
    <div class="card-header"><span class="card-title t-purple">👤 RESUMEN POR CLIENTE / PROVEEDOR</span></div>
    <div class="search-wrap">
      <input class="search-inp" type="text" placeholder="🔍 Buscar..." value="${clienteFiltro}"
        list="clientes-list"
        oninput="setClienteFiltro(this.value)"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"/>
      <datalist id="clientes-list">${allNames.map(nm=>`<option value="${nm}">`).join("")}</datalist>
      ${clienteFiltro?`<button class="del-btn" style="font-size:18px" onclick="clienteFiltro='';document.querySelector('.search-inp').value='';renderClienteResults()">×</button>`:""}
    </div>
    <div id="cliente-results">${body}</div>
  </div>`;
}

function buildFacturaText(nombre,ventas,compras,tVBs,tVCop,tCBs,tCCop,fecha){
  const sep="═══════════════════════";
  let txt=`${sep}\n`;
  txt+=`  📊 ESTADO DE CUENTA\n`;
  txt+=`  ${nombre.toUpperCase()}\n`;
  txt+=`  Fecha: ${fecha}\n`;
  txt+=`${sep}\n`;

  if(ventas.length>0){
    txt+=`\n  📤 COMPRAS (te vendí)\n`;
    txt+=`  ${"─".repeat(23)}\n`;
    ventas.forEach((v,i)=>{
      const cop=n(v.bs)*n(v.tasa);
      txt+=`  ${i+1}. ${fmt(n(v.bs),2)} Bs × ${fmt(n(v.tasa),4)}\n`;
      txt+=`     💵 ${fmtCOP(cop)}\n`;
    });
    txt+=`  ${"─".repeat(23)}\n`;
    txt+=`  Total: ${fmt(tVBs,2)} Bs\n`;
    txt+=`  Total: ${fmtCOP(tVCop)}\n`;
  }

  if(compras.length>0){
    txt+=`\n  📥 VENTAS (me compraste)\n`;
    txt+=`  ${"─".repeat(23)}\n`;
    compras.forEach((c,i)=>{
      const cop=n(c.bs)*n(c.tasa);
      txt+=`  ${i+1}. ${fmt(n(c.bs),2)} Bs × ${fmt(n(c.tasa),4)}\n`;
      txt+=`     💵 ${fmtCOP(cop)}\n`;
    });
    txt+=`  ${"─".repeat(23)}\n`;
    txt+=`  Total: ${fmt(tCBs,2)} Bs\n`;
    txt+=`  Total: ${fmtCOP(tCCop)}\n`;
  }

  // Fiado balance
  const deuNombre=nombre.toLowerCase().trim();
  if(state.deudores[deuNombre]){
    const saldo=getSaldoDeudor(deuNombre);
    if(saldo>0){
      txt+=`\n  💳 SALDO PENDIENTE\n`;
      txt+=`  ${"─".repeat(23)}\n`;
      txt+=`  ${fmtCOP(saldo)}\n`;
    }
  }

  if(ventas.length>0&&compras.length>0){
    const nBS=tVBs-tCBs, nCOP=tVCop-tCCop;
    txt+=`\n${sep}\n`;
    txt+=`  ⚖️ SALDO NETO\n`;
    txt+=`  ${nBS>=0?"Me debes":"Te debo"}: ${fmt(Math.abs(nBS),2)} Bs\n`;
    txt+=`  ${nCOP>=0?"Me debes":"Te debo"}: ${fmtCOP(Math.abs(nCOP))}\n`;
  }
  txt+=`${sep}`;
  return txt;
}
function copyFactura(text){
  navigator.clipboard.writeText(text).then(()=>showToast("Copiado ✓","ok")).catch(()=>showToast("No se pudo copiar","err"));
}

// EXCEL EXPORT
function exportClienteExcel(nombre){
  const wb = XLSX.utils.book_new();
  const rows = [[`ESTADO DE CUENTA — ${nombre.toUpperCase()}`],
    [`Generado: ${new Date().toLocaleString("es-CO")}`],[]];

  // All transactions across all days
  let totalVBs=0,totalVCop=0,totalCBs=0,totalCCop=0;
  let hasVentas=false, hasCompras=false;

  // VENTAS
  const ventasRows=[];
  state.days.forEach((day,di)=>{
    const lbl=day.label||`Día ${di+1}`;
    day.ventas.filter(v=>v.nombre&&v.nombre.toLowerCase()===nombre.toLowerCase()&&n(v.bs)>0)
      .forEach(v=>{
        const cop=n(v.bs)*n(v.tasa);
        ventasRows.push([lbl, n(v.bs), n(v.tasa), cop,
          state.accounts.find(a=>a.cod===v.cod)?.nombre||v.cod||"—",
          v.fiado?"Fiado":"Contado"]);
        totalVBs+=n(v.bs); totalVCop+=cop; hasVentas=true;
      });
  });
  if(hasVentas){
    rows.push(["📤 VENTAS (Lo que me debe)"]);
    rows.push(["FECHA","Bs","TASA","TOTAL COP","CUENTA","TIPO"]);
    ventasRows.forEach(r=>rows.push(r));
    rows.push(["TOTAL",totalVBs,"",totalVCop,"",""]);
    rows.push([]);
  }

  // COMPRAS
  const comprasRows=[];
  state.days.forEach((day,di)=>{
    const lbl=day.label||`Día ${di+1}`;
    day.compras.filter(c=>c.nombre&&c.nombre.toLowerCase()===nombre.toLowerCase()&&n(c.bs)>0)
      .forEach(c=>{
        const cop=n(c.bs)*n(c.tasa);
        comprasRows.push([lbl, n(c.bs), n(c.tasa), cop,
          state.accounts.find(a=>a.cod===c.cod)?.nombre||c.cod||"—",
          c.fiado?"Fiado":"Contado"]);
        totalCBs+=n(c.bs); totalCCop+=cop; hasCompras=true;
      });
  });
  if(hasCompras){
    rows.push(["📥 COMPRAS (Lo que le debo)"]);
    rows.push(["FECHA","Bs","TASA","TOTAL COP","CUENTA","TIPO"]);
    comprasRows.forEach(r=>rows.push(r));
    rows.push(["TOTAL",totalCBs,"",totalCCop,"",""]);
    rows.push([]);
  }

  // DEUDORES
  const deuNombre=nombre.toLowerCase().trim();
  if(state.deudores[deuNombre]){
    const d=state.deudores[deuNombre];
    const saldo=getSaldoDeudor(deuNombre);
    rows.push(["⚖️ ESTADO DE CUENTA (Fiado)"]);
    rows.push(["FECHA","MONTO COP","TIPO"]);
    d.movs.forEach(m=>rows.push([m.fecha, m.cop, "Cargo"]));
    d.abonos.forEach(ab=>rows.push([ab.fecha, ab.cop, "Abono"]));
    rows.push([]);
    rows.push(["SALDO PENDIENTE", Math.max(0,saldo)]);
  }

  // NET
  if(hasVentas&&hasCompras){
    rows.push(["⚖️ SALDO NETO"]);
    rows.push([totalVBs-totalCBs>=0?"Me debe (Bs)":"Le debo (Bs)", Math.abs(totalVBs-totalCBs)]);
    rows.push([totalVCop-totalCCop>=0?"Me debe (COP)":"Le debo (COP)", Math.abs(totalVCop-totalCCop)]);
  }

  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=[{wch:18},{wch:16},{wch:12},{wch:16},{wch:20},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,nombre.slice(0,31));
  XLSX.writeFile(wb,`Estado_Cuenta_${nombre}_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast(`Excel de ${nombre} descargado ✓`,"ok");
}

  sRows.push(["DIA","INICIO Bs","Bs COMP","COP COMP","Bs VEND","COP VEND","PROM COMPRA","PROM VENTA","UTILIDAD","QUEDA Bs","VALOR PESOS"]);

  const wsS=XLSX.utils.aoa_to_sheet(sRows);
  wsS["!cols"]=Array(11).fill({wch:16});
  XLSX.utils.book_append_sheet(wb,wsS,"Resumen General");
  XLSX.writeFile(wb,`Control_Bs_${new Date().toISOString().slice(0,10)}.xlsx`);

// ══ INIT ═══════════════════════════════════════════════════
// ══ DEUDORES / ACREEDORES ═════════════════════════════════
function getSaldoDeudor(nombre){
  const d=state.deudores[nombre];
  if(!d) return 0;
  const totalMov=d.movs.reduce((a,m)=>a+m.cop,0);
  const totalAbonos=d.abonos.reduce((a,ab)=>a+ab.cop,0);
  return totalMov-totalAbonos;
}

function fiarMov(tipo, idx){
  initCuentasState();
  const day=state.days[state.currentDay];
  const mov=day[tipo][idx];
  if(!mov.nombre||!n(mov.bs)||!n(mov.tasa)){
    showToast("Completa nombre, Bs y tasa antes de fiar","err"); return;
  }
  const cop=n(mov.bs)*n(mov.tasa);
  const nombreLow=mov.nombre.toLowerCase().trim();
  const nombreUp=mov.nombre.trim().toUpperCase();
  const tipoDeu=tipo==="ventas"?"cobrar":"pagar";
  const dayLabel=day.label||new Date().toLocaleDateString("es-CO");

  // Toggle fiado
  if(mov.fiado){
    // Remove from clientes2/proveedores2
    const lista=tipo==="ventas"?state.clientes2:state.proveedores2;
    const persona=lista.find(p=>p.nombre.toUpperCase()===nombreUp);
    if(persona){
      // Remove the operation linked to this mov
      const opIdx=persona.operaciones.findIndex(op=>
        op.diaIdx===state.currentDay&&op.movIdx===idx&&op.movTipo===tipo);
      if(opIdx>=0) persona.operaciones.splice(opIdx,1);
    }
    mov.fiado=false;
    showToast(`Removido del fiado`,"ok");
  } else {
    // Add to clientes2/proveedores2
    const lista=tipo==="ventas"?state.clientes2:state.proveedores2;
    let persona=lista.find(p=>p.nombre.toUpperCase()===nombreUp);
    if(!persona){
      // Auto-create if not exists
      persona={nombre:nombreUp, operaciones:[], abonos:[]};
      lista.push(persona);
      showToast(`${nombreUp} agregado a ${tipo==="ventas"?"Clientes":"Proveedores"} ✓`,"ok");
    }
    persona.operaciones.push({
      fecha:dayLabel, diaIdx:state.currentDay, movIdx:idx, movTipo:tipo,
      desc:"BS", bs:n(mov.bs), tasa:n(mov.tasa), cop
    });
    mov.fiado=true;
    showToast(`${mov.nombre} — ${fmtCOP(cop)} registrado en ${tipo==="ventas"?"Clientes":"Proveedores"} ✓`,"ok");
  }
  saveLocal(); syncSave();
  reRenderMov(tipo);
  // Re-render cuentas if visible
  if(currentView==="cuentas") renderCuentasApp();
  // Update posicion if visible
  if(currentView==="posicion") renderPosicionPage();
}

function abonarDeudor(nombre, monto){
  const cop=rawNum(monto);
  if(!cop||cop<=0){showToast("Ingresa un monto válido","err");return;}
  const day=state.days[state.currentDay];
  const fecha=day.label||`Día ${state.currentDay+1}`;
  if(!state.deudores[nombre]) return;
  state.deudores[nombre].abonos.push({fecha, cop});
  saveLocal(); syncSave();
  renderDeudoresBlock();
  showToast(`Abono de ${fmtCOP(cop)} registrado ✓`,"ok");
}

function buildMediosSub(esDia){
  const pagosFilter=esDia
    ?state.pagos.filter(p=>p.diaIdx===state.currentDay)
    :state.pagos;
  if(!pagosFilter.length) return "Sin pagos registrados";
  const byMedio=pagosFilter.reduce((acc,p)=>{
    const k=p.medio||"Sin especificar";
    acc[k]=(acc[k]||0)+p.monto; return acc;
  },{});
  return Object.entries(byMedio).map(([m,t])=>`${m}: ${fmtCOP(t)}`).join(" · ");
}

function buildPosContent(){
  const esDia = posTab==="dia";
  const day=state.days[state.currentDay];

  // ── Inventario Bs (valor al costo) ──
  let valorBs=0;
  if(esDia && day){
    const r=calcResumen(day);
    valorBs=r.valorPesos;
  } else {
    // último día
    const lastDay=state.days[state.days.length-1];
    if(lastDay){ const r=calcResumen(lastDay); valorBs=r.valorPesos; }
  }

  // ── Utilidades ──
  let utilidad=0;
  if(esDia && day){
    utilidad=calcResumen(day).utilidad;
  } else {
    utilidad=state.days.reduce((a,d)=>a+calcResumen(d).utilidad,0);
  }

  // ── Clientes (por cobrar) ──
  initCuentasState();
  const totalCobrar=(state.clientes2||[]).reduce((a,c)=>a+getSaldoCliente2(c),0);

  // ── Proveedores (por pagar) ──
  const totalPagar=(state.proveedores2||[]).reduce((a,p)=>a+getSaldoCliente2(p),0);

  // ── Gastos ──
  let totalGastos=0;
  if(esDia && day){
    totalGastos=state.gastos.filter(g=>g.diaIdx===state.currentDay).reduce((a,g)=>a+g.monto,0);
  } else {
    totalGastos=state.gastos.reduce((a,g)=>a+g.monto,0);
  }

  // ── Pagos recibidos ──
  let totalPagosRecibidos=0;
  if(esDia){
    totalPagosRecibidos=state.pagos.filter(p=>p.diaIdx===state.currentDay).reduce((a,p)=>a+p.monto,0);
  } else {
    totalPagosRecibidos=state.pagos.reduce((a,p)=>a+p.monto,0);
  }

  // ── Posición neta ──
  // ── Bancos ──
  const totalBancos2=(state.bancos2||[]).reduce((a,b)=>a+b.saldo,0)+(state.efectivo?.saldo||0);

  // ── Capital y cuadre ──
  const capital = n(state.capital)||0;
  // Lo que DEBERÍA tener = Capital + Utilidades - Gastos
  const deberTener = capital + utilidad - totalGastos;
  // Lo que TIENE = Inventario Bs + Bancos + Por cobrar - Por pagar
  const tieneTener = valorBs + totalBancos2 + totalCobrar - totalPagar;
  const diferencia = tieneTener - deberTener;
  const cuadrado = Math.abs(diferencia) < 1000; // margen de 1000 COP

  const posNeta = valorBs + totalCobrar + totalBancos2 + utilidad - totalPagar - totalGastos;

  const items = [
    {label:"💰 INVENTARIO Bs (costo)", val:valorBs, type:"positive",
     sub:"Valor de tus Bs al precio de compra"},
    {label:"🏦 MIS BANCOS + EFECTIVO", val:totalBancos2, type:"positive",
     sub:"Saldo total en cuentas y efectivo"},
    {label:"📋 POR COBRAR (clientes)", val:totalCobrar, type:"positive",
     sub:"Lo que te deben los clientes"},
    {label:"📈 UTILIDADES", val:utilidad, type:"neutral",
     sub:esDia?"Ganancia del día":"Ganancia acumulada del mes"},
    {label:"📋 POR PAGAR (proveedores)", val:totalPagar, type:"negative",
     sub:"Lo que debes a proveedores"},
    {label:"💸 GASTOS", val:totalGastos, type:"negative",
     sub:esDia?"Gastos del día":"Gastos del mes"},
    {label:"⚖️ POSICIÓN NETA TOTAL", val:posNeta,
     type:posNeta>=0?"total":"negative",
     sub:"Inventario + Bancos + Cobrar + Utilidades − Pagar − Gastos"},
  ];

  // Cuadre block HTML
  const cuadreHTML = capital>0 ? `
    <div style="margin:0 14px 14px;border-radius:10px;overflow:hidden;
      border:2px solid ${cuadrado?"var(--green)":"var(--red)"}">
      <div style="padding:10px 14px;background:${cuadrado?"rgba(34,197,94,.15)":"rgba(239,68,68,.15)"};
        display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;font-weight:700;color:${cuadrado?"var(--green)":"var(--red)"}">
          ${cuadrado?"✅ SISTEMA CUADRADO":"❌ HAY UN DESCUADRE"}
        </span>
        <span style="font-family:var(--mono);font-size:14px;font-weight:700;
          color:${cuadrado?"var(--green)":"var(--red)"}">
          ${cuadrado?"":"Diferencia: "+fmtCOP(Math.abs(diferencia))}
        </span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
        <div style="padding:10px 14px;border-right:1px solid var(--border)">
          <div style="font-size:9px;color:var(--dim);font-weight:700;letter-spacing:.5px;margin-bottom:4px">
            DEBERÍA TENER
          </div>
          <div style="font-size:10px;color:var(--dim);margin-bottom:6px">Capital + Utilidades − Gastos</div>
          <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text)">
            ${fmtCOP(deberTener)}
          </div>
          <div style="font-size:10px;color:var(--dim);margin-top:4px">
            Capital: ${fmtCOP(capital)} + Utilidades: ${fmtCOP(utilidad)} − Gastos: ${fmtCOP(totalGastos)}
          </div>
        </div>
        <div style="padding:10px 14px">
          <div style="font-size:9px;color:var(--dim);font-weight:700;letter-spacing:.5px;margin-bottom:4px">
            TIENE EN REALIDAD
          </div>
          <div style="font-size:10px;color:var(--dim);margin-bottom:6px">Bs + Bancos + Cobrar − Pagar</div>
          <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text)">
            ${fmtCOP(tieneTener)}
          </div>
          <div style="font-size:10px;color:var(--dim);margin-top:4px">
            Bs: ${fmtCOP(valorBs)} + Bancos: ${fmtCOP(totalBancos2)} + Cobrar: ${fmtCOP(totalCobrar)} − Pagar: ${fmtCOP(totalPagar)}
          </div>
        </div>
      </div>
    </div>` : `
    <div style="margin:0 14px 14px;padding:12px 14px;background:var(--bg3);border-radius:8px;
      border:1px dashed var(--border);text-align:center">
      <div style="font-size:11px;color:var(--dim);margin-bottom:8px">
        Ingresa tu capital inicial para activar el cuadre automático
      </div>
      <div style="display:flex;gap:8px;max-width:300px;margin:0 auto">
        <input class="df-inp" id="capital-inp" inputmode="decimal" placeholder="Capital inicial COP"
          value="${state.capital||""}"
          style="flex:1"/>
        <button class="action-btn ab-cyan" style="width:auto;padding:6px 12px"
          onclick="guardarCapital()">✓</button>
      </div>
    </div>`;

  return {
    items: items.map(item=>`
      <div class="bal-item ${item.type}">
        <div class="bal-label">${item.label}</div>
        <div class="bal-val">${fmtCOP(item.val)}</div>
        <div class="bal-sub">${item.sub}</div>
      </div>`).join(""),
    cuadre: cuadreHTML
  };
}

function registrarPago(){
  const cliente = document.getElementById("p-cliente").value.trim();
  const monto   = rawNum(document.getElementById("p-monto").value);
  const medio   = document.getElementById("p-medio").value;
  const nota    = document.getElementById("p-nota").value.trim();
  if(!monto||monto<=0){showToast("Ingresa el monto","err");return;}

  const day   = state.days[state.currentDay];
  const fecha = day?.label||`Día ${state.currentDay+1}`;

  // Register pago
  state.pagos.push({cliente,monto,medio,nota,fecha,diaIdx:state.currentDay});

  // If cliente matches a deudor, auto-abonar
  if(cliente){
    const key=cliente.toLowerCase().trim();
    if(state.deudores[key]){
      state.deudores[key].abonos.push({fecha,cop:monto,medio});
      showToast(`✓ Pago registrado y abonado a ${cliente}`,"ok");
    } else {
      showToast(`✓ Pago de ${fmtCOP(monto)} registrado`,"ok");
    }
  } else {
    showToast(`✓ Pago de ${fmtCOP(monto)} registrado`,"ok");
  }

  // Clear form
  document.getElementById("p-cliente").value="";
  document.getElementById("p-monto").value="";
  document.getElementById("p-nota").value="";

  saveLocal(); syncSave();
  renderDeudoresBlock();
  renderPosicionBlock();
}

function delPago(idx){
  const pago=state.pagos[idx];
  // Reverse abono if it was linked to a deudor
  if(pago.cliente){
    const key=pago.cliente.toLowerCase().trim();
    if(state.deudores[key]){
      const ai=state.deudores[key].abonos.findIndex(
        a=>a.cop===pago.monto&&a.fecha===pago.fecha);
      if(ai>=0) state.deudores[key].abonos.splice(ai,1);
    }
  }
  state.pagos.splice(idx,1);
  saveLocal(); syncSave(); renderDeudoresBlock(); renderPosicionBlock();
  showToast("Pago eliminado","ok");
}

// Initialize cuentas state if not present
function initCuentasState(){
  if(!state.clientes2) state.clientes2=[];
  if(!state.proveedores2) state.proveedores2=[];
  if(!state.bancos2) state.bancos2=[
    {nombre:"Banco JAS",saldo:0},{nombre:"Bancolombia Papa",saldo:0},
    {nombre:"Bancolombia YH",saldo:0},{nombre:"Bancolombia Yosmel",saldo:0},
    {nombre:"Nequi",saldo:0},{nombre:"Salvador",saldo:0},
    {nombre:"Compensar Munich",saldo:0}
  ];
  if(!state.movsBanco2) state.movsBanco2=[];
  // Efectivo especial
  if(!state.efectivo) state.efectivo={
    saldo:0, apertura:0,
    cierres:[],  // [{fecha, apertura, entradas, salidas, cierre}]
    movs:[]      // [{fecha, tipo, monto, desc}]
  };
}

function getSaldoCliente2(p){
  const totalOps=p.operaciones.reduce((a,op)=>a+op.cop,0);
  const totalAbonos=p.abonos.reduce((a,ab)=>a+ab.monto,0);
  return totalOps-totalAbonos;
}

function renderPosicionPage(){
  const el=document.getElementById("posicion-page");
  if(!el) return;
  el.innerHTML=renderPosicionHTML().replace('id="posicion-block"','id="posicion-block-page"');
}

function renderCuentasApp(){
  initCuentasState();
  const el=document.getElementById("cuentas-app");
  if(!el) return;
  // Include all balances including negatives for accurate position
  const totalCobrar=state.clientes2.reduce((a,c)=>a+getSaldoCliente2(c),0);
  const totalDebo=state.proveedores2.reduce((a,p)=>a+getSaldoCliente2(p),0);
  const queda=totalCobrar-totalDebo;
  el.innerHTML=`
    <div class="resumen-bar">
      <div class="rb-item"><div class="rb-label">RECOGER (CLIENTES)</div><div class="rb-val rb-cobrar">${fmtCOP(totalCobrar)}</div></div>
      <div class="rb-item"><div class="rb-label">DEBO (PROVEEDORES)</div><div class="rb-val rb-debo">${fmtCOP(totalDebo)}</div></div>
      <div class="rb-item"><div class="rb-label">QUEDA</div><div class="rb-val rb-queda">${fmtCOP(queda)}</div></div>
    </div>
    <div class="pos-tabs" style="margin-bottom:16px">
      <button class="pos-tab active" id="ctab-clientes" data-tab="clientes" onclick="setCuentasTab('clientes')">👥 Clientes</button>

    <div id="cuentas-content"></div>
    <div id="detalle-cliente" style="display:none"></div>`;

function renderListaPersonas(tipo){
  initCuentasState();
  const lista=tipo==="clientes"?state.clientes2:state.proveedores2;
  const titulo=tipo==="clientes"?"Cliente":"Proveedor";
  const esCliente=tipo==="clientes";
  const totalSaldo=lista.reduce((a,p)=>a+Math.max(0,getSaldoCliente2(p)),0);
  let rows=lista.map((p,i)=>{
    const saldo=getSaldoCliente2(p);
    const pendiente=saldo>0;
    const negativo=saldo<0;
    const saldoColor=pendiente?(esCliente?"var(--orange)":"var(--red)"):(negativo?"var(--red)":"var(--green)");
    const estadoLabel=pendiente?"Pendiente":(negativo?(esCliente?"Overpaid":"Saldado+"):"Al día");
    return `<tr style="cursor:pointer" onclick="verDetalle('${tipo}',${i})">
      <td style="font-weight:600">${p.nombre}</td>
      <td style="font-family:var(--mono);color:${saldoColor};font-weight:700">${fmtCOP(saldo)}</td>
      <td style="color:var(--dim)">${p.operaciones.length}</td>
      <td><span style="font-size:10px;padding:2px 8px;border-radius:10px;
        background:${pendiente?"rgba(255,107,26,.15)":negativo?"rgba(239,68,68,.15)":"rgba(34,197,94,.15)"};
        color:${saldoColor}">${estadoLabel}</span></td>
      <td><button class="del-btn" onclick="event.stopPropagation();delPersona('${tipo}',${i})">×</button></td>
    </tr>`;
  }).join("");
  return `<div class="card">
    <div class="card-header" style="justify-content:space-between">

function agregarPersona(tipo){
  const nombre=prompt("Nombre:");
  if(!nombre||!nombre.trim()) return;
  const lista=tipo==="clientes"?state.clientes2:state.proveedores2;
  if(lista.find(p=>p.nombre.toLowerCase()===nombre.toLowerCase())){showToast("Ya existe","err");return;}
  lista.push({nombre:nombre.trim().toUpperCase(),operaciones:[],abonos:[]});
  saveLocal();syncSave();renderCuentasApp();setCuentasTab(tipo);
  showToast(`${nombre.toUpperCase()} agregado ✓`,"ok");
}
function delPersona(tipo,idx){
  const lista=tipo==="clientes"?state.clientes2:state.proveedores2;
  if(!confirm(`¿Eliminar ${lista[idx].nombre}?`)) return;
  lista.splice(idx,1);saveLocal();syncSave();renderCuentasApp();setCuentasTab(tipo);
}

function actualizarDestinoOrigen(){
  const tipo=document.getElementById("bmov-tipo")?.value;
  const destSel=document.getElementById("bmov-destino");
  const destLabel=document.getElementById("bmov-dest-label");
  const subWrap=document.getElementById("bmov-sub-wrap");
  const subSel=document.getElementById("bmov-sub");
  const subLabel=document.getElementById("bmov-sub-label");
  if(!destSel) return;

  if(tipo==="e"){
    destLabel.textContent="ORIGEN (¿de dónde viene?)";
    // Show only entrada options
    Array.from(destSel.options).forEach(o=>{
      o.style.display=["cobro","deposito","tbanco_in","venta_bs","otro_in"].includes(o.value)?"":"none";
    });
    destSel.value="cobro";
  } else {
    destLabel.textContent="DESTINO (¿a dónde va?)";
    Array.from(destSel.options).forEach(o=>{
      o.style.display=["gasto","retiro","prov","tbanco","otro"].includes(o.value)?"":"none";
    });
    destSel.value="gasto";
  }

  // Show sub-selector for prov or tbanco
  destSel.onchange=()=>{
    const val=destSel.value;
    if(val==="prov"){
      subWrap.style.display="block";
      subLabel.textContent="PROVEEDOR";
      subSel.innerHTML=state.proveedores2.map(p=>`<option value="${p.nombre}">${p.nombre}</option>`).join("")||"<option>Sin proveedores</option>";
    } else if(val==="tbanco"||val==="tbanco_in"){
      subWrap.style.display="block";
      subLabel.textContent="CUENTA";
      subSel.innerHTML=state.bancos2.filter((_,i)=>i!==bancoFormIdx).map(b=>`<option value="${b.nombre}">${b.nombre}</option>`).join("")||"<option>Sin otras cuentas</option>";
    } else if(val==="cobro"){
      subWrap.style.display="block";
      subLabel.textContent="CLIENTE";
      subSel.innerHTML=state.clientes2.map(c=>`<option value="${c.nombre}">${c.nombre}</option>`).join("")||"<option>Sin clientes</option>";
    } else {
      subWrap.style.display="none";
    }
  };
}

function guardarMovBanco2(){
  const idx=bancoFormIdx;
  if(idx===null) return;
  const monto=rawNum(document.getElementById("bmov-monto").value);
  if(!monto){showToast("Ingresa el monto","err");return;}
  const tipo=document.getElementById("bmov-tipo").value;
  const destino=document.getElementById("bmov-destino").value;
  const subSel=document.getElementById("bmov-sub");
  const subVal=subSel&&document.getElementById("bmov-sub-wrap").style.display!=="none"?subSel.value:"";
  const fecha=document.getElementById("bmov-fecha").value||new Date().toLocaleDateString("es-CO");
  const desc=(document.getElementById("bmov-desc").value||"").toUpperCase();

  // Update bank balance
  state.bancos2[idx].saldo+=tipo==="e"?monto:-monto;

  // Initialize movs array if needed
  if(!state.bancos2[idx].movs) state.bancos2[idx].movs=[];
  state.bancos2[idx].movs.push({fecha,tipo,monto,destino,subVal,desc});

  // Auto-apply effects
  if(destino==="prov"&&subVal){
    const prov=state.proveedores2.find(p=>p.nombre===subVal);
    if(prov){ prov.abonos.push({fecha,monto,ref:`Pago desde ${state.bancos2[idx].nombre}`}); }
    showToast(`Pago de ${fmtCOP(monto)} a ${subVal} ✓`,"ok");
  } else if((destino==="tbanco"||destino==="tbanco_in")&&subVal){
    const otra=state.bancos2.find(b=>b.nombre===subVal);
    if(otra){ otra.saldo+=tipo==="e"?-monto:monto; }
    showToast(`Transferencia de ${fmtCOP(monto)} ✓`,"ok");
  } else if(destino==="cobro"&&subVal){
    const cliente=state.clientes2.find(c=>c.nombre===subVal);
    if(cliente){ cliente.abonos.push({fecha,monto,ref:`Cobro en ${state.bancos2[idx].nombre}`}); }
    showToast(`Cobro de ${fmtCOP(monto)} a ${subVal} ✓`,"ok");
  } else if(destino==="gasto"){
    state.gastos.push({desc:desc||"Gasto bancario",monto,fecha,diaIdx:state.currentDay});
    showToast(`Gasto de ${fmtCOP(monto)} registrado ✓`,"ok");
  } else if(destino==="efectivo_out"){
    // Banco → Efectivo: suma al efectivo
    initCuentasState();
    state.efectivo.saldo+=monto;
    state.efectivo.movs.push({fecha,tipo:"e",monto,desc:desc||`Desde ${state.bancos2[idx].nombre}`});
    showToast(`${fmtCOP(monto)} pasaron a Efectivo ✓`,"ok");
  } else if(destino==="efectivo_in"){
    // Efectivo → Banco: resta del efectivo
    initCuentasState();
    state.efectivo.saldo-=monto;
    state.efectivo.movs.push({fecha,tipo:"s",monto,desc:desc||`A ${state.bancos2[idx].nombre}`});
    showToast(`${fmtCOP(monto)} salieron de Efectivo ✓`,"ok");
  } else {
    showToast(`${tipo==="e"?"+":"-"} ${fmtCOP(monto)} en ${state.bancos2[idx].nombre} ✓`,"ok");
  }

  saveLocal(); syncSave();
  const bf=document.getElementById("banco-form");
  if(bf) bf.style.display="none";
  renderCuentasApp(); setCuentasTab("bancos"); renderResumen2();
  showToast("Movimiento guardado ✓","ok");
}
