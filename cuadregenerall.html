        <div>
          <div class="card-title" style="color:var(--orange);font-size:15px">${p.nombre}</div>
          <div style="font-size:10px;color:var(--dim);margin-top:2px">${p.operaciones.length} ops · ${p.abonos.length} abonos</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:9px;color:var(--dim);font-weight:700">${esCliente?"POR COBRAR":"POR PAGAR"}</div>
          <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${saldo>0?(esCliente?"var(--orange)":"var(--red)"):"var(--green)"}">${fmtCOP(Math.max(0,saldo))}</div>
        </div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>FECHA</th><th>REF</th><th>Bs</th><th>TASA</th><th>MONTO COP</th><th>SALDO</th></tr></thead>
        <tbody>${filas||`<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--dim)">Sin operaciones aún</td></tr>`}</tbody>
      </table></div>
      <div style="display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);flex-wrap:wrap">
        <button class="action-btn ab-cyan" style="flex:1;justify-content:center;min-width:140px" onclick="abrirNuevaOp()">+ Nueva operación</button>
        <button class="action-btn ab-green" style="flex:1;justify-content:center;min-width:140px" onclick="abrirAbono()">💵 Registrar abono</button>
        <button class="action-btn ab-blue" style="flex:1;justify-content:center;min-width:140px" onclick="exportarEstadoCuenta('${tipo}',${idx})">⬇ Estado de cuenta</button>
      </div>
    </div>
    <div id="form-op" style="display:none"></div>
    <div id="form-abono" style="display:none"></div>`;
}

function cerrarDetalle(){
  clienteSeleccionado=null;
  document.getElementById("cuentas-content").style.display="block";
  document.getElementById("detalle-cliente").style.display="none";
  renderResumen2();
}

function abrirNuevaOp(){
  const el=document.getElementById("form-op");
  el.style.display="block";
  el.innerHTML=`<div class="card" style="margin-top:12px">
    <div class="card-header"><span class="card-title" style="color:var(--orange)">+ Nueva Operación</span></div>
    <div class="directo-grid" style="padding:14px">
      <div class="df"><div class="df-label">FECHA</div>
        <input class="df-inp" id="op-fecha" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>
      <div class="df"><div class="df-label">REFERENCIA</div>
        <input class="df-inp" id="op-desc" placeholder="BS, SHARON, COMPENSAR..."/></div>
      <div class="df"><div class="df-label">Bs (opcional)</div>
        <input class="df-inp" id="op-bs" inputmode="decimal" placeholder="0"/></div>
      <div class="df"><div class="df-label">TASA (opcional)</div>
        <input class="df-inp" id="op-tasa" inputmode="decimal" placeholder="0,0000"/></div>
      <div class="df" style="grid-column:1/-1"><div class="df-label">MONTO COP (si no usas Bs×Tasa)</div>
        <input class="df-inp" id="op-cop" inputmode="decimal" placeholder="0"/></div>
    </div>
    <div style="padding:0 14px 14px;display:flex;gap:8px">
      <button class="reg-btn" style="flex:1" onclick="guardarOp()">✓ Guardar</button>
      <button class="action-btn ab-cyan" style="width:auto;padding:8px 14px" onclick="document.getElementById('form-op').style.display='none'">Cancelar</button>
    </div>
  </div>`;
}

function guardarOp(){
  if(!clienteSeleccionado) return;
  const {tipo,idx}=clienteSeleccionado;
  const lista=tipo==="clientes"?state.clientes2:state.proveedores2;
  const p=lista[idx];
  const bs=rawNum(document.getElementById("op-bs").value);
  const tasa=rawNum(document.getElementById("op-tasa").value);
  const copInp=rawNum(document.getElementById("op-cop").value);
  const cop=bs&&tasa?bs*tasa:copInp;
  if(!cop){showToast("Ingresa Bs×Tasa o Monto COP","err");return;}
  const fecha=document.getElementById("op-fecha").value||new Date().toLocaleDateString("es-CO");
  const desc=(document.getElementById("op-desc").value||"BS").toUpperCase();
  p.operaciones.push({fecha,desc,bs,tasa,cop});
  saveLocal();syncSave();
  document.getElementById("form-op").style.display="none";
  verDetalle(tipo,idx);renderResumen2();
  showToast(`${fmtCOP(cop)} guardado ✓`,"ok");
}

function abrirAbono(){
  initCuentasState();
  const el=document.getElementById("form-abono");
  el.style.display="block";
  el.innerHTML=`<div class="card" style="margin-top:12px">
    <div class="card-header"><span class="card-title" style="color:var(--green)">💵 Registrar Abono</span></div>
    <div class="directo-grid" style="padding:14px">
      <div class="df"><div class="df-label">FECHA</div>
        <input class="df-inp" id="ab-fecha" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>
      <div class="df"><div class="df-label">MONTO COP</div>
        <input class="df-inp" id="ab-monto" inputmode="decimal" placeholder="0"/></div>
      <div class="df"><div class="df-label">VA A (banco o proveedor)</div>
        <select class="pago-select" id="ab-destino">
          <option value="">-- Solo abonar --</option>
          ${state.bancos2.map(b=>`<option value="banco:${b.nombre}">${b.nombre}</option>`).join("")}
          ${state.proveedores2.map(pv=>`<option value="prov:${pv.nombre}">${pv.nombre} (proveedor)</option>`).join("")}
        </select>
      </div>
      <div class="df"><div class="df-label">REFERENCIA</div>
        <input class="df-inp" id="ab-ref" placeholder="Bancolombia YH, efectivo..."/></div>
    </div>
    <div style="padding:0 14px 14px;display:flex;gap:8px">
      <button class="reg-btn" style="flex:1;background:linear-gradient(135deg,#16a34a,#22c55e)" onclick="guardarAbono()">✓ Registrar abono</button>
      <button class="action-btn ab-cyan" style="width:auto;padding:8px 14px" onclick="document.getElementById('form-abono').style.display='none'">Cancelar</button>
    </div>
  </div>`;
}

function guardarAbono(){
  if(!clienteSeleccionado) return;
  const {tipo,idx}=clienteSeleccionado;
  const lista=tipo==="clientes"?state.clientes2:state.proveedores2;
  const p=lista[idx];
  const monto=rawNum(document.getElementById("ab-monto").value);
  if(!monto){showToast("Ingresa el monto","err");return;}
  const fecha=document.getElementById("ab-fecha").value||new Date().toLocaleDateString("es-CO");
  const ref=(document.getElementById("ab-ref").value||"Abono").toUpperCase();
  const destino=document.getElementById("ab-destino").value;
  p.abonos.push({fecha,monto,ref});
  if(destino.startsWith("banco:")){
    const bNombre=destino.replace("banco:","");
    const banco=state.bancos2.find(b=>b.nombre===bNombre);
    if(banco){banco.saldo+=monto;showToast(`+${fmtCOP(monto)} en ${bNombre} ✓`,"ok");}
  } else if(destino.startsWith("prov:")){
    const pNombre=destino.replace("prov:","");
    const prov=state.proveedores2.find(pv=>pv.nombre===pNombre);
    if(prov){prov.abonos.push({fecha,monto,ref:`Pago de ${p.nombre}`});showToast(`Abonado a ${pNombre} ✓`,"ok");}
  } else {showToast(`Abono de ${fmtCOP(monto)} registrado ✓`,"ok");}
  saveLocal();syncSave();
  document.getElementById("form-abono").style.display="none";
  verDetalle(tipo,idx);renderResumen2();
}

function abrirMovEfectivo(tipo){
  initCuentasState();
  const el=document.getElementById("efectivo-form");
  if(!el) return;
  el.style.display="block";

  // Build destination options based on type
  const destOpts = tipo==="e" ? `
    <option value="">-- Sin destino específico --</option>
    <option value="gasto">💸 Viene de gasto recuperado</option>
    ${state.clientes2.map(c=>`<option value="cliente:${c.nombre}">👥 Cobro a ${c.nombre}</option>`).join("")}
    ${state.bancos2.map(b=>`<option value="banco:${b.nombre}">🏦 Desde ${b.nombre}</option>`).join("")}
  ` : `
    <option value="">-- Sin destino específico --</option>
    <option value="gasto">💸 Es un gasto</option>
    ${state.proveedores2.map(p=>`<option value="prov:${p.nombre}">🏦 Pago a ${p.nombre}</option>`).join("")}
    ${state.clientes2.map(c=>`<option value="cliente:${c.nombre}">👥 Cobro a ${c.nombre}</option>`).join("")}
    ${state.bancos2.map(b=>`<option value="banco:${b.nombre}">🔄 A ${b.nombre}</option>`).join("")}
  `;

  el.innerHTML=`<div style="background:var(--bg3);border-radius:8px;padding:12px;margin-top:8px;border:1px solid rgba(251,191,36,.2)">
    <div style="font-size:10px;font-weight:700;color:#fbbf24;margin-bottom:10px">
      ${tipo==="e"?"+ ENTRADA DE EFECTIVO":"− SALIDA DE EFECTIVO"}
    </div>
    <div class="directo-grid">
      <div class="df"><div class="df-label">MONTO COP</div>
        <input class="df-inp" id="ef-monto" inputmode="decimal" placeholder="0"/></div>
      <div class="df"><div class="df-label">${tipo==="e"?"ORIGEN":"DESTINO"}</div>
        <select class="pago-select" id="ef-destino">${destOpts}</select></div>
      <div class="df" style="grid-column:1/-1"><div class="df-label">DESCRIPCIÓN</div>
        <input class="df-inp" id="ef-desc" placeholder="${tipo==="e"?"Cobro, venta...":"Pago, gasto..."}"/></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="${tipo==="e"?"action-btn ab-green":"action-btn"}"
        style="${tipo==="s"?"background:rgba(239,68,68,.2);color:var(--red);":""}flex:1;justify-content:center"
        onclick="guardarMovEfectivo('${tipo}')">✓ Registrar</button>
      <button class="action-btn ab-cyan" style="width:auto;padding:8px 14px"
        onclick="document.getElementById('efectivo-form').style.display='none'">Cancelar</button>
    </div>
  </div>`;
}

function guardarMovEfectivo(tipo){
  initCuentasState();
  const monto=rawNum(document.getElementById("ef-monto").value);
  if(!monto){showToast("Ingresa el monto","err");return;}
  const desc=(document.getElementById("ef-desc").value||"Movimiento efectivo").toUpperCase();
  const destino=document.getElementById("ef-destino")?.value||"";
  const hoy=new Date().toLocaleDateString("es-CO");

  state.efectivo.movs.push({fecha:hoy,tipo,monto,desc});
  state.efectivo.saldo+=tipo==="e"?monto:-monto;

  // Auto-apply destination effects
  if(destino.startsWith("cliente:")){
    const nombre=destino.replace("cliente:","");
    const c=state.clientes2.find(c=>c.nombre===nombre);
    if(c){ c.abonos.push({fecha:hoy,monto,ref:"Cobro en Efectivo"}); showToast(`Cobro de ${fmtCOP(monto)} a ${nombre} ✓`,"ok"); }
  } else if(destino.startsWith("prov:")){
    const nombre=destino.replace("prov:","");
    const p=state.proveedores2.find(p=>p.nombre===nombre);
    if(p){ p.abonos.push({fecha:hoy,monto,ref:"Pago en Efectivo"}); showToast(`Pago de ${fmtCOP(monto)} a ${nombre} ✓`,"ok"); }
  } else if(destino.startsWith("banco:")){
    const nombre=destino.replace("banco:","");
    const b=state.bancos2.find(b=>b.nombre===nombre);
    if(b){ b.saldo+=tipo==="e"?-monto:monto; showToast(`Transferencia a ${nombre} ✓`,"ok"); }
  } else if(destino==="gasto"){
    state.gastos.push({desc,monto,fecha:hoy,diaIdx:state.currentDay});
    showToast(`Gasto de ${fmtCOP(monto)} registrado ✓`,"ok");
  } else {
    showToast(`${tipo==="e"?"+":"-"} ${fmtCOP(monto)} en efectivo ✓`,"ok");
  }

  document.getElementById("efectivo-form").style.display="none";
  saveLocal();syncSave();renderCuentasApp();setCuentasTab("bancos");
  renderResumen2();
}

function verHistorialEfectivo(){
  initCuentasState();
  const ef=state.efectivo;
  const movs=[...ef.movs].reverse(); // most recent first
  const el=document.getElementById("cuentas-content");
  const det=document.getElementById("detalle-cliente");
  el.style.display="none";
  det.style.display="block";

  // Group by date
  const byFecha={};
  ef.movs.forEach(m=>{
    if(!byFecha[m.fecha]) byFecha[m.fecha]={movs:[],entradas:0,salidas:0};
    byFecha[m.fecha].movs.push(m);
    if(m.tipo==="e") byFecha[m.fecha].entradas+=m.monto;
    else byFecha[m.fecha].salidas+=m.monto;
  });

  const fechas=Object.keys(byFecha).sort().reverse();
  let histHTML="";
  fechas.forEach(fecha=>{
    const g=byFecha[fecha];
    const net=g.entradas-g.salidas;
    histHTML+=`
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;
          padding:6px 14px;background:var(--bg3);border-radius:6px;margin-bottom:4px">
          <span style="font-size:11px;font-weight:700;color:var(--dim2)">${fecha}</span>
          <div style="display:flex;gap:12px;font-family:var(--mono);font-size:10px">
            <span style="color:var(--green)">+${fmtCOP(g.entradas)}</span>
            <span style="color:var(--red)">-${fmtCOP(g.salidas)}</span>
            <span style="color:${net>=0?"#fbbf24":"var(--red)"};font-weight:700">=${fmtCOP(net)}</span>
          </div>
        </div>
        ${g.movs.map(m=>`
          <div style="display:flex;justify-content:space-between;align-items:center;
            padding:5px 14px;border-bottom:1px solid rgba(255,255,255,.04)">
            <span style="font-size:11px;color:var(--dim2)">${m.desc||"Movimiento"}</span>
            <span style="font-family:var(--mono);font-size:11px;font-weight:700;
              color:${m.tipo==="e"?"var(--green)":"var(--red)"}">
              ${m.tipo==="e"?"+":"-"}${fmtCOP(m.monto)}
            </span>
          </div>`).join("")}
      </div>`;
  });

  // Cierres section
  const cierresHTML=ef.cierres.length>0?`
    <div class="card" style="margin-top:12px">
      <div class="card-header"><span class="card-title" style="color:#fbbf24">🔒 Historial de Cierres</span></div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>FECHA</th><th>APERTURA</th><th>ENTRADAS</th><th>SALIDAS</th><th>CIERRE</th></tr></thead>
        <tbody>${ef.cierres.map(c=>`
          <tr>
            <td style="font-size:10px;color:var(--dim)">${c.fecha}</td>
            <td class="td-mono">${fmtCOP(c.apertura)}</td>
            <td class="td-green td-mono">${fmtCOP(c.entradas)}</td>
            <td class="td-red td-mono">${fmtCOP(c.salidas)}</td>
            <td style="font-family:var(--mono);font-weight:700;color:#fbbf24">${fmtCOP(c.cierre)}</td>
          </tr>`).join("")}
        </tbody>
      </table></div>
    </div>`:"";

  det.innerHTML=`
    <button class="action-btn ab-cyan" style="width:auto;padding:5px 14px;margin-bottom:12px"
      onclick="cerrarDetalle()">← Volver</button>
    <div class="card">
      <div class="card-header" style="justify-content:space-between">
        <span class="card-title" style="color:#fbbf24">💵 Historial de Efectivo</span>
        <span style="font-family:var(--mono);font-weight:700;font-size:15px;color:#fbbf24">
          Saldo: ${fmtCOP(ef.saldo)}
        </span>
      </div>
      <div style="padding:12px 14px">
        ${histHTML||`<div style="text-align:center;padding:20px;color:var(--dim)">Sin movimientos aún</div>`}
      </div>
    </div>
    ${cierresHTML}`;
}

function abrirCierreCaja(){
  initCuentasState();
  const ef=state.efectivo;
  const hoy=new Date().toLocaleDateString("es-CO");
  const movsHoy=ef.movs.filter(m=>m.fecha===hoy);
  const entradasHoy=movsHoy.filter(m=>m.tipo==="e").reduce((a,m)=>a+m.monto,0);
  const salidasHoy=movsHoy.filter(m=>m.tipo==="s").reduce((a,m)=>a+m.monto,0);
  const saldoCierre=ef.apertura+entradasHoy-salidasHoy;

  const el=document.getElementById("efectivo-form");
  if(!el) return;
  el.style.display="block";
  el.innerHTML=`<div style="background:rgba(251,191,36,.08);border-radius:8px;padding:14px;
    margin-top:8px;border:1px solid rgba(251,191,36,.3)">
    <div style="font-size:12px;font-weight:700;color:#fbbf24;margin-bottom:12px">🔒 CIERRE DE CAJA — ${hoy}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div style="background:var(--bg3);border-radius:6px;padding:8px 12px">
        <div style="font-size:9px;color:var(--dim);font-weight:700">APERTURA</div>
        <div style="font-family:var(--mono);font-weight:700">${fmtCOP(ef.apertura)}</div>
      </div>
      <div style="background:var(--bg3);border-radius:6px;padding:8px 12px">
        <div style="font-size:9px;color:var(--green);font-weight:700">ENTRADAS</div>
        <div style="font-family:var(--mono);font-weight:700;color:var(--green)">${fmtCOP(entradasHoy)}</div>
      </div>
      <div style="background:var(--bg3);border-radius:6px;padding:8px 12px">
        <div style="font-size:9px;color:var(--red);font-weight:700">SALIDAS</div>
        <div style="font-family:var(--mono);font-weight:700;color:var(--red)">${fmtCOP(salidasHoy)}</div>
      </div>
      <div style="background:rgba(251,191,36,.15);border-radius:6px;padding:8px 12px;border:1px solid rgba(251,191,36,.3)">
        <div style="font-size:9px;color:#fbbf24;font-weight:700">CIERRE</div>
        <div style="font-family:var(--mono);font-weight:700;color:#fbbf24;font-size:15px">${fmtCOP(saldoCierre)}</div>
      </div>
    </div>
    <div class="df" style="margin-bottom:10px">
      <div class="df-label">MONTO DE APERTURA PARA MAÑANA</div>
      <input class="df-inp" id="ef-apertura-nueva" inputmode="decimal"
        value="${saldoCierre}" placeholder="${saldoCierre}"/>
      <div style="font-size:10px;color:var(--dim);margin-top:4px">
        Por defecto usa el cierre de hoy. Cámbialo si dejas menos para mañana.
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button style="flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;
        background:linear-gradient(135deg,#d97706,#fbbf24);color:#000;font-weight:700;
        font-family:var(--font);font-size:13px" onclick="ejecutarCierreCaja(${saldoCierre})">
        🔒 Confirmar cierre
      </button>
      <button class="action-btn ab-cyan" style="width:auto;padding:8px 14px" onclick="document.getElementById('efectivo-form').style.display='none'">Cancelar</button>
    </div>
  </div>`;
}

function ejecutarCierreCaja(saldoCierre){
  initCuentasState();
  const nuevaApertura=rawNum(document.getElementById("ef-apertura-nueva").value)||saldoCierre;
  const hoy=new Date().toLocaleDateString("es-CO");
  const ef=state.efectivo;
  const movsHoy=ef.movs.filter(m=>m.fecha===hoy);
  const entradasHoy=movsHoy.filter(m=>m.tipo==="e").reduce((a,m)=>a+m.monto,0);
  const salidasHoy=movsHoy.filter(m=>m.tipo==="s").reduce((a,m)=>a+m.monto,0);

  // Register cierre
  ef.cierres.push({
    fecha:hoy, apertura:ef.apertura,
    entradas:entradasHoy, salidas:salidasHoy,
    cierre:saldoCierre
  });

  // Set new apertura
  ef.apertura=nuevaApertura;
  ef.saldo=nuevaApertura;

  document.getElementById("efectivo-form").style.display="none";
  saveLocal();syncSave();renderCuentasApp();setCuentasTab("bancos");
  showToast(`Caja cerrada ✓ — Apertura mañana: ${fmtCOP(nuevaApertura)}`,"ok");
}

function renderResumen2(){
  initCuentasState();
  const rb=document.querySelector(".resumen-bar");
  if(!rb) return;
  const totalCobrar=(state.clientes2||[]).reduce((a,c)=>a+getSaldoCliente2(c),0);
  const totalDebo=(state.proveedores2||[]).reduce((a,p)=>a+getSaldoCliente2(p),0);
  const queda=totalCobrar-totalDebo;
  const items=rb.querySelectorAll(".rb-val");
  if(items[0]) items[0].textContent=fmtCOP(totalCobrar);
  if(items[1]) items[1].textContent=fmtCOP(totalDebo);
  if(items[2]) items[2].textContent=fmtCOP(queda);
}

function exportarEstadoCuenta(tipo,idx){
  initCuentasState();
  const lista=tipo==="clientes"?state.clientes2:state.proveedores2;
  const p=lista[idx];
  const saldo=getSaldoCliente2(p);
  const wb=XLSX.utils.book_new();
  const rows=[[`ESTADO DE CUENTA — ${p.nombre}`],[`Generado: ${new Date().toLocaleString("es-CO")}`],[]];
  rows.push(["FECHA","REFERENCIA","Bs","TASA","MONTO COP","SALDO"]);
  let saldoAcum=0;
  [...p.operaciones.map(op=>({...op,esAbono:false})),...p.abonos.map(ab=>({fecha:ab.fecha,desc:ab.ref||"ABONO",bs:"",tasa:"",cop:-ab.monto,esAbono:true}))].sort((a,b)=>a.fecha>b.fecha?1:-1).forEach(r=>{saldoAcum+=r.cop;rows.push([r.fecha,r.desc,r.bs||"",r.tasa||"",r.esAbono?-r.cop:r.cop,Math.max(0,saldoAcum)]);});
  rows.push([]);rows.push(["SALDO ACTUAL","",""," ",Math.max(0,saldo)]);
  const ws=XLSX.utils.aoa_to_sheet(rows);ws["!cols"]=Array(6).fill({wch:18});
  XLSX.utils.book_append_sheet(wb,ws,p.nombre.slice(0,31));
  XLSX.writeFile(wb,`Estado_${p.nombre}_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast(`Estado de cuenta de ${p.nombre} descargado ✓`,"ok");
}


</script>
